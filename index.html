<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <div class="shot-wrapper">
          <h3>User's Selection</h3>
          <div id="user-selection"></div>
        </div>

        <h2>Vs</h2>
        <div class="shot-wrapper">
          <h3>Bot's Selection</h3>
          <div id="shot-selection"></div>
        </div>
      </div>

      <p>You choose</p>

      <div class="btn-container">
        <h3></h3>
        <button class="button" id="rock">🪨</button>
        <button class="button" id="paper">📃</button>
        <button class="button" id="scissors">✂️</button>
      </div>
    </div>
  </body>
</html>
